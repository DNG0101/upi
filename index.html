<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pay via UPI - <Your Business Name></title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f5f0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .payment-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            padding: 28px 24px 36px;
            transition: transform 0.2s ease;
        }
        .store-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .store-icon {
            font-size: 48px;
            margin-bottom: 8px;
        }
        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1f2937;
        }
        .store-sub {
            color: #6b7280;
            font-size: 14px;
            margin-top: 4px;
        }
        .amount-box {
            background: #fef9e6;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            margin-bottom: 32px;
        }
        .amount-label {
            font-size: 14px;
            letter-spacing: 1px;
            color: #b45309;
            font-weight: 500;
        }
        .amount-value {
            font-size: 48px;
            font-weight: 800;
            color: #1f2937;
            line-height: 1.2;
        }
        .rupee-symbol {
            font-size: 32px;
            font-weight: 600;
        }
        .info-row {
            background: #f9fafb;
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            font-size: 15px;
        }
        .info-label {
            color: #6b7280;
        }
        .info-value {
            font-weight: 500;
            color: #111827;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }
        .divider {
            height: 1px;
            background: #e5e7eb;
            margin: 24px 0;
        }
        .pay-button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }
        .pay-button:active {
            transform: scale(0.97);
            background: #1d4ed8;
        }
        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid #f3f4f6;
            padding-top: 20px;
            margin-top: 8px;
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }
        @media (max-width: 480px) {
            .payment-card { padding: 20px 16px; }
            .amount-value { font-size: 40px; }
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="store-header">
        <div class="store-icon">🏪</div>
        <h2>Donthula Nithish</h2>
        <div class="store-sub">Verified Merchant</div>
    </div>

    <div class="amount-box">
        <div class="amount-label">TOTAL PAYABLE</div>
        <div class="amount-value">
            <span class="rupee-symbol">₹</span> 20.00
        </div>
    </div>

    <div class="info-row">
        <span class="info-label">Merchant UPI ID</span>
        <span class="info-value">6304522525@amazonpay</span>
    </div>
    <div class="info-row">
        <span class="info-label">Transaction ID</span>
        <span class="info-value" id="transactionId">Loading...</span>
    </div>
    <div class="info-row">
        <span class="info-label">Payment Note</span>
        <span class="info-value">Service payment</span>
    </div>

    <div class="divider"></div>

    <button class="pay-button" id="payNowBtn">
        💳  Pay with UPI  →
    </button>

    <div class="footer-note">
        ⚡ Instant bank transfer via UPI apps
    </div>
</div>

<div id="toastMsg" class="toast-message">🔓 Opening UPI apps...</div>

<script>
    // ----- MERCHANT CONFIGURATION -----
    const MERCHANT_VPA = "6304522525@amazonpay";
    const MERCHANT_NAME = "Donthula Nithish";
    const AMOUNT = "20";
    const CURRENCY = "INR";
    const TRANSACTION_NOTE = "Service payment";
    
    // Generate a unique transaction reference ID
    const generateTransactionId = () => {
        const timestamp = Date.now().toString();
        const random = Math.random().toString(36).substring(2, 8).toUpperCase();
        return `TXN${timestamp}${random}`.slice(0, 35); // Max 35 chars as per NPCI rules
    };

    // Build the UPI deep link URL
    const buildUpiLink = (txnId) => {
        const params = new URLSearchParams({
            pa: MERCHANT_VPA,
            pn: MERCHANT_NAME,
            am: AMOUNT,
            cu: CURRENCY,
            tn: TRANSACTION_NOTE,
            tr: txnId
        });
        return `upi://pay?${params.toString()}`;
    };

    // ---- UI & INTERACTION ----
    const transactionIdSpan = document.getElementById('transactionId');
    const payButton = document.getElementById('payNowBtn');
    const toast = document.getElementById('toastMsg');

    const showToast = (message, duration = 2000) => {
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    };

    // Launch UPI Intent using App Chooser
    const launchUpiIntent = (upiUrl) => {
        // Create an invisible anchor element
        const link = document.createElement('a');
        link.href = upiUrl;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    };

    // Main click handler
    const handlePayment = () => {
        const txnId = generateTransactionId();
        
        // Update the UI with the new transaction ID
        transactionIdSpan.textContent = txnId;
        
        const upiUrl = buildUpiLink(txnId);
        console.log("Launching UPI Intent:", upiUrl);
        
        showToast("📱 Opening UPI apps...", 1500);
        
        // Launch the intent after a short delay to ensure the toast is visible
        setTimeout(() => {
            launchUpiIntent(upiUrl);
        }, 100);
    };

    // Attach event listener
    payButton.addEventListener('click', (e) => {
        e.preventDefault();
        handlePayment();
    });

    // Initialize UI with a first transaction ID
    transactionIdSpan.textContent = generateTransactionId();
</script>
</body>
</html>
