<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Secure UPI Checkout · Instant Pay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .payment-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 24px 20px 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }

        .merchant-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .merchant-logo {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .merchant-name {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
        }

        .merchant-vpa {
            font-family: monospace;
            font-size: 13px;
            background: #f1f5f9;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 8px;
            color: #334155;
        }

        .amount-section {
            text-align: center;
            background: #f8fafc;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .amount-label {
            font-size: 14px;
            color: #64748b;
            letter-spacing: 1px;
        }

        .amount-value {
            font-size: 48px;
            font-weight: 800;
            color: #0f172a;
            line-height: 1.2;
        }

        .rupee-symbol {
            font-size: 28px;
            font-weight: 600;
        }

        .intent-button {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .intent-button:active {
            transform: scale(0.97);
            background: #1d4ed8;
        }

        .qr-fallback {
            text-align: center;
            padding: 20px 16px;
            background: #f9fafb;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
        }

        .qr-title {
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 12px;
        }

        .qr-container {
            background: white;
            padding: 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 12px;
        }

        .qr-note {
            font-size: 12px;
            color: #64748b;
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
            white-space: nowrap;
        }

        .separation {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin: 16px 0;
            position: relative;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="merchant-header">
        <div class="merchant-logo">🏪</div>
        <div class="merchant-name">Donthula Nithish</div>
        <div class="merchant-vpa">6304522525@okbizaxis</div>
    </div>

    <div class="amount-section">
        <div class="amount-label">TOTAL PAYABLE</div>
        <div class="amount-value">
            <span class="rupee-symbol">₹</span>20.00
        </div>
    </div>

    <button class="intent-button" id="payNowBtn">
        ⚡ Pay with UPI App
    </button>

    <div class="separation">——— 100% working fallback ———</div>

    <div class="qr-fallback">
        <div class="qr-title">📱 Scan & Pay (No Risk Flag)</div>
        <div id="qrCodeContainer" class="qr-container"></div>
        <div class="qr-note">Open any UPI app → Scan this QR → Pay ₹20</div>
    </div>
</div>

<div id="toastMsg" class="toast-message">🔄 Opening UPI apps...</div>

<!-- QR Code Library (Lightweight, CDN) -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

<script>
    // ----- MERCHANT CONFIGURATION (USE YOUR EXISTING BUSINESS VPA)-----
    const MERCHANT_VPA = "6304522525@okbizaxis";
    const MERCHANT_NAME = "Donthula Nithish";
    const AMOUNT = "20";
    const CURRENCY = "INR";
    const PAYMENT_NOTE = "Order payment";

    // Generate a unique transaction reference (NPCI recommends unique 'tr' param for tracking)
    const generateTransactionId = () => {
        const timestamp = Date.now().toString();
        const random = Math.random().toString(36).substring(2, 8).toUpperCase();
        return `TXN${timestamp}${random}`.slice(0, 35);
    };

    // Build the UPI deep link (this is the 'Intent' URL)
    const buildUpiIntent = (txnId) => {
        const params = new URLSearchParams({
            pa: MERCHANT_VPA,
            pn: MERCHANT_NAME,
            am: AMOUNT,
            cu: CURRENCY,
            tn: PAYMENT_NOTE,
            tr: txnId
        });
        return `upi://pay?${params.toString()}`;
    };

    // Build the full Android 'intent://' wrapper (more explicit for Android)
    const buildAndroidIntent = (txnId) => {
        const params = new URLSearchParams({
            pa: MERCHANT_VPA,
            pn: MERCHANT_NAME,
            am: AMOUNT,
            cu: CURRENCY,
            tn: PAYMENT_NOTE,
            tr: txnId
        });
        // This format helps Android recognize the payment intent more reliably
        return `intent://pay?${params.toString()}#Intent;scheme=upi;end;`;
    };

    // Show toast feedback
    const showToast = (message, duration = 2000) => {
        const toast = document.getElementById('toastMsg');
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, duration);
    };

    // Attempt the Intent flow (best case) and fallback gracefully
    const initiatePayment = () => {
        const txnId = generateTransactionId();
        const intentUrl = buildUpiIntent(txnId);
        const androidIntentUrl = buildAndroidIntent(txnId);
        
        console.log("Initiating UPI Intent for Txn:", txnId);
        showToast("🔓 Opening UPI apps...", 1500);
        
        // Try the standard upi:// scheme first (most compatible)
        window.location.href = intentUrl;
        
        // Backup: after 300ms, try the Android-specific intent wrapper
        setTimeout(() => {
            window.location.href = androidIntentUrl;
        }, 300);
        
        // If the page remains visible after 3 seconds, the intent probably failed.
        // This is our signal to show the user the QR code fallback.
        setTimeout(() => {
            if (document.visibilityState === 'visible') {
                showToast("⚠️ App didn't open? Scan the QR code below", 3000);
                // Scroll to QR section to prompt user
                document.querySelector('.qr-fallback').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 3000);
    };

    // Generate the QR code (guaranteed to work, no risk warnings)
    const generateQrCode = () => {
        const upiLink = buildUpiIntent(generateTransactionId());
        const qrContainer = document.getElementById('qrCodeContainer');
        qrContainer.innerHTML = ''; // Clear previous
        new QRCode(qrContainer, {
            text: upiLink,
            width: 160,
            height: 160,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    };

    // Attach click listener to the main button
    document.getElementById('payNowBtn').addEventListener('click', (e) => {
        e.preventDefault();
        initiatePayment();
    });

    // Generate QR on page load (ensures user always has a working method)
    generateQrCode();
</script>
</body>
</html>
