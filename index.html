<!DOCTYPE html>
<html>
<head>
    <title>UPI Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f5f5f5;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            width: 350px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: green;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Pay ₹20</h2>
    <p>Donthula Nithish</p>

    <button onclick="payNow()">
        Pay Securely
    </button>
</div>

<script>
function payNow() {

    const upiId = "6304522525@okbizaxis";
    const name = "Donthula Nithish";
    const amount = "20";

    // safer transaction reference
    const txnRef = "ORD" + new Date().getTime();

    const note = "Payment";

    const upiUrl =
        "upi://pay?" +
        "pa=" + encodeURIComponent(upiId) +
        "&pn=" + encodeURIComponent(name) +
        "&am=" + amount +
        "&cu=INR" +
        "&tn=" + encodeURIComponent(note) +
        "&tr=" + txnRef;

    // redirect after user click
    window.location.href = upiUrl;
}
</script>

</body>
</html>
