<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPI Intent Test</title>
</head>
<body>
    <button id="payBtn">Pay with UPI (Intent)</button>

    <script>
        function buildIntentUrl(amount, note, targetPackage) {
            // Base UPI parameters
            const baseParams = new URLSearchParams({
                pa: "6304522525@okbizaxis",
                pn: "Donthula Nithish",
                am: amount,
                cu: "INR",
                tn: note
            });
            // Construct the intent:// URL
            // Format: intent://pay?PARAMS#Intent;scheme=upi;package=PKG;end;
            const intentUrl = `intent://pay?${baseParams.toString()}#Intent;scheme=upi;package=${targetPackage};end;`;
            return intentUrl;
        }

        document.getElementById('payBtn').addEventListener('click', function(e) {
            e.preventDefault();
            
            // Choose which UPI app to target (empty = system chooser)
            // You can set to "" or omit package to let Android choose
            const packageName = "";  // Empty uses system resolver
            
            // For specific apps, use:
            // Google Pay: "com.google.android.apps.nbu.paisa.user"
            // PhonePe: "com.phonepe.app"
            // Paytm: "net.one97.paytm"
            // BHIM: "in.org.npci.upiapp"
            
            const amount = "20";
            const note = "Payment for membership";
            
            let intentUrl;
            if (packageName) {
                intentUrl = `intent://pay?pa=6304522525@okbizaxis&pn=Donthula%20Nithish&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}#Intent;scheme=upi;package=${packageName};end;`;
            } else {
                // Without package, Android shows chooser
                intentUrl = `intent://pay?pa=6304522525@okbizaxis&pn=Donthula%20Nithish&am=${amount}&cu=INR&tn=${encodeURIComponent(note)}#Intent;scheme=upi;end;`;
            }
            
            console.log("Launching: " + intentUrl);
            window.location.href = intentUrl;
            
            // Fallback: if intent fails to open any app
            setTimeout(() => {
                alert("No UPI app found. Please install Google Pay, PhonePe, or Paytm.");
            }, 1000);
        });
    </script>
</body>
</html>
